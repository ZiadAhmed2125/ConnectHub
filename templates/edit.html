{% extends "layout.html" %}

{% block title %}
    Edit Profile
{% endblock %}

{% block main %}

    <form action="/edit" method="post" enctype="multipart/form-data">

    <!-- Note
         Make sure it remember the old
         values where the user does not enter anything -->

        <h3 class="mb-3">Profile Information</h3>

        <div class="row align-items-center g-4 mb-4">

        <!-- Profile Picture -->
            <div class="col-md-3 text-center">

                {% if user.profile_picture %}
                    <img
                        src="{{ url_for('static', filename='profile_pictures/' ~ user.profile_picture) }}"
                        class="rounded-circle img-fluid border profile-picture-preview"
                        alt="Profile Picture">
                {% else %}
                    <i class="bi bi-person-circle"
                       style="font-size:150px; color:#4F46E5;"></i>
                {% endif %}

                <div class="mt-3">
                    <input
                        type="file"
                        class="form-control"
                        name="profile_picture"
                        accept="image/*">

                    <div class="form-check mt-2">
                        <input
                            class="form-check-input"
                            type="checkbox"
                            name="remove_picture"
                            id="remove_picture">

                        <label class="form-check-label" for="remove_picture">
                            Use default profile picture
                        </label>
                    </div>
                </div>
            </div>

        <!-- Username -->
            <div class="col-md-9">
                <label class="form-label">Username</label>
                <input
                    autocomplete="off"
                    autofocus
                    class="form-control"
                    name="username"
                    type="text"
                    maxlength="30"
                    value="{{ user.username }}">
            </div>

        </div>

        <div class="mb-4">
            <label class="form-label">Bio</label>
            <textarea
                class="form-control"
                name="new_bio"
                placeholder="Tell people about yourself..."
                rows="5"
                maxlength="300">{{ user.bio }}</textarea>
        </div>

        <hr class="my-4">

        <h3 class="mb-3">Personal Details</h3>

        <div class="row">

            <div class="col-md-6 mb-3">
                <label class="form-label">Birthday</label>
                <input
                    class="form-control"
                    name="birthday"
                    type="date"
                    value="{{ user.birthday }}">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Relationship Status</label>
                <select class="form-select" name="relationship">
                    <option value="">Prefer not to say</option>
                    <option value="Single" {% if user.relationship == "Single" %}selected{% endif %}>Single</option>
                    <option value="In a relationship" {% if user.relationship == "In a relationship" %}selected{% endif %}>In a relationship</option>
                    <option value="Engaged" {% if user.relationship == "Engaged" %}selected{% endif %}>Engaged</option>
                    <option value="Married" {% if user.relationship == "Married" %}selected{% endif %}>Married</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Job</label>
                <input
                    class="form-control"
                    name="job"
                    type="text"
                    maxlength="100"
                    value="{{ user.job }}">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Education</label>
                <input
                    class="form-control"
                    name="education"
                    type="text"
                    maxlength="100"
                    value="{{ user.education }}">
            </div>

            <div class="col-12 mb-3">
                <label class="form-label">Location</label>
                <input
                    class="form-control"
                    name="location"
                    type="text"
                    maxlength="100"
                    placeholder="City, Country"
                    value="{{ user.location }}">
            </div>

        </div>

        <button class="btn btn-primary mt-3" type="submit">
            Save Changes
        </button>

    </form>

{% endblock %}
