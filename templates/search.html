{% extends "layout.html" %}

{% block title %}
    Search
{% endblock %}

{% block main %}

    <h2 class="mb-4">Search Results</h2>

    {% if users %}
        <div class="list-group mx-auto w-100" style="max-width: 500px;">
            {% for user in users %}
                <a
                    href="/profile/{{ user.id }}"
                    class="list-group-item list-group-item-action text-center">
                    <i class="bi bi-person-circle me-2" style="color: #4F46E5;"></i>
                    <strong class="text-break">
                        {{ user.username }}
                    </strong>
                </a>
            {% endfor %}
        </div>
    {% else %}
        <div class="alert alert-secondary mx-auto w-100" style="max-width: 500px;">
            No users found.
        </div>
    {% endif %}

{% endblock %}
