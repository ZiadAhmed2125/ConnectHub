{% extends "layout.html" %}

{% block title %}
    Edit Post
{% endblock %}

{% block main %}
    <h4 class="text-start mb-3"> Editing a post </h4>

    <div class="card mx-auto shadow-sm mb-4 post-box w-100">
            <div class="card-body post-box">
                <form action="/edit_post" method="post" enctype="multipart/form-data">

                    <input
                        type="hidden"
                        name="post_id"
                        value="{{ post.id }}">

                    <textarea
                        class="form-control mb-3"
                        name="content"
                        rows="3"
                        maxlength="1000"
                        >{{ post.content }}</textarea>

                    {% if post.image %}
                        <img
                            src="{{ url_for('static', filename='posts_pictures/' ~ post.image) }}"
                            class="img-fluid rounded mb-3"
                            alt="Post image"
                            style="max-width:100%; max-height:300px; object-fit:contain;">

                        <div class="form-check mb-3">
                            <input
                                class="form-check-input"
                                type="checkbox"
                                name="remove_image"
                                id="removeImage">

                            <label class="form-check-label" for="removeImage">
                                Remove current image
                            </label>
                        </div>
                    {% endif %}

                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                        <label for="post_image" class="form-label" style="color: aliceblue;">
                            Upload a photo
                        </label>
                        
                        <input
                            class="form-control"
                            type="file"
                            name="post_image"
                            accept="image/*">

                        <button 
                            class="btn btn-primary"
                            type="submit">
                            Edit Post
                        </button>
                    </div>
                </form>
            </div>
        </div>
{% endblock %}
