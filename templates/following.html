{% extends "layout.html" %}

{% block title %}
    Following
{% endblock %}

{% block main %}
    <h2 class="mb-4">Following</h2>

    {% if following %}
        <div class="list-group mx-auto w-100 user-list">
            {% for user in following %}
                <a href="/profile/{{ user.id }}" class="list-group-item list-group-item-action d-flex align-items-center">
                    <i class="bi bi-person-circle me-2" style="color: #4F46E5;"></i>
                    <strong class="text-break">{{ user.username }}</strong>
                </a>
            {% endfor %}
        </div>
    {% else %}
        <div class="alert alert-secondary mx-auto w-100 user-list">
            You are not following any one.
        </div>
    {% endif %}

{% endblock %}
